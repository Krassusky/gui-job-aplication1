name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (must match an existing tag, e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_glob: 'dist/*.zip'
            artifact_name: installer-windows
          - os: macos-latest
            artifact_glob: 'dist/*.zip'
            artifact_name: installer-macos
          - os: ubuntu-latest
            artifact_glob: 'dist/*.zip'
            artifact_name: installer-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Build with PyInstaller
        run: |
          pip install pyinstaller
          pyinstaller autoapply.spec
        timeout-minutes: 15

      - name: Package distribution
        shell: bash
        run: |
          cd dist
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('../pyproject.toml','rb'))['project']['version'])")
          if [ "$RUNNER_OS" = "Windows" ]; then
            PLATFORM="win-x64"
            cp ../LEIA-ME.txt JobApplyAssistant/LEIA-ME.txt
            7z a "JobApplyAssistant-${VERSION}-${PLATFORM}.zip" JobApplyAssistant/
          elif [ "$RUNNER_OS" = "macOS" ]; then
            PLATFORM="mac-x64"
            cp ../LEIA-ME.txt JobApplyAssistant/LEIA-ME.txt
            zip -r "JobApplyAssistant-${VERSION}-${PLATFORM}.zip" JobApplyAssistant/
          else
            PLATFORM="linux-x64"
            cp ../LEIA-ME.txt JobApplyAssistant/LEIA-ME.txt
            zip -r "JobApplyAssistant-${VERSION}-${PLATFORM}.zip" JobApplyAssistant/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            artifacts/installer-windows/*
            artifacts/installer-macos/*
            artifacts/installer-linux/*
          body_path: .github/release-notes-template.md
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: false
